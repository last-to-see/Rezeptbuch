<!DOCTYPE html>
<html>
<head>
    
    <meta charset="UTF-8">
    <title>Libro de recetas</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
    
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: url("{{ url_for('static', filename='background_picture.jpg') }}") no-repeat center center;
            background-size: cover;

            opacity: 0.6;
            z-index: -1;
        }
    </style>
</head>

<body>
<div id="countdown" style="text-align: center; font-weight: bold; padding: 10px;">
        Next update in: loading...
    </div>
<nav>

    <h1>Libro de recetas</h1>
    
    <div class="links">

        <a href="/">Home</a>

        {% if current_user.is_authenticated %}
            <a href="/recipe/new">Nueva</a>
            <a href="/folders">Carpetas</a>
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a>
        {% endif %}

    </div>

</nav>

<div class="container">

    {% block content %}{% endblock %}

</div>
<script>
    const targetDate = new Date("2026-05-10 23:59:59");

    function updateCountdown() {
        const now = new Date();
        const diff = targetDate - now;

        if (diff <=0) {
            document.getElementById("countdown").innerHTML = "Update is live!";
            return
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("countdown").innerHTML =
        `Next update in: ${days}d ${hours}h ${minutes}m ${seconds}s`;
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>
</body>

</html>
